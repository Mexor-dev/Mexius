<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <link rel="icon" type="image/png" href="/_app/zeroclaw-trans.png" />
    <title>Mexius</title>
    <script type="module" crossorigin src="/_app/assets/index-BjDAUs1g.js"></script>
    <link rel="stylesheet" crossorigin href="/_app/assets/index-U88q_gzZ.css">
  </head>
  <body>
    <header style="padding:12px;background:#061018;color:#cfe8ff;font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif"><h1 style="margin:0;font-size:18px">Mexius</h1></header>
    <div id="root"></div>

    <script>
      // Demo injector: simulate a Nexus debate and pull soul stats
      window.addEventListener('load', () => {
        setTimeout(() => {
          const tryInject = () => {
            let panel = document.querySelector('.nexus-panel');
            if (!panel) {
              // Create a lightweight demo Nexus panel if the SPA doesn't provide one
              panel = document.createElement('div');
              panel.className = 'nexus-panel';
              const e1 = document.createElement('div'); e1.className = 'nexus-entry'; e1.textContent = '[STRATEGIST]';
              const e2 = document.createElement('div'); e2.className = 'nexus-entry'; e2.textContent = '[CODER]';
              const meta = document.createElement('div'); meta.className = 'mt-3 text-xs'; meta.textContent = 'Soul: --';
              panel.appendChild(e1); panel.appendChild(e2); panel.appendChild(meta);
              panel.style.padding = '12px'; panel.style.border = '1px solid #234'; panel.style.margin = '12px'; panel.style.background = '#031018';
              document.body.insertBefore(panel, document.getElementById('root'));
            }
            const entries = panel.querySelectorAll('.nexus-entry');
            if (entries && entries.length >= 2) {
              entries[0].textContent = '[STRATEGIST] \nProposed approach: evaluate options and prioritize safety.';
              entries[1].textContent = '[CODER] \nImplementation sketch: add async handler and unit tests.';
            }
            panel.classList.add('nexus-debate');
            const soulText = panel.querySelector('.mt-3.text-xs');
            fetch('/api/soul_monitor').then(r => r.json()).then(j => {
              const s = (j && j.neural_activity) ? j.neural_activity : j;
              if (s && soulText) {
                soulText.textContent = `Soul: ${((s.cpu_percent||0).toFixed(1))}% CPU · ${Math.round((s.mem_used_kb||0)/1024/1024)}MB used`;
              }
            }).catch(() => {});
            setTimeout(() => { panel.classList.remove('nexus-debate'); }, 8000);
          };
          tryInject();
        }, 1200);
      });
    </script>

  </body>
</html>
